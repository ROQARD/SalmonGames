<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Dashboard</title>
    <script src="https://unpkg.com/@gamepush/sdk/dist/gamepush.js"></script>
    <style>
        :root { --bg: #0a0a0b; --card: #16161e; --accent: #22c55e; --text: #f4f4f5; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #27272a; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-4px); }
        .card img { width: 100%; height: 140px; object-fit: cover; background: #000; }
        .card p { padding: 12px; margin: 0; font-size: 14px; font-weight: 600; text-align: center; }

        #theater { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 15px; left: 15px; padding: 10px 20px; background: var(--accent); color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; z-index: 1001; }
    </style>
</head>
<body>

    <div id="loading">Initializing System...</div>

    <h2 style="text-align:center; color: var(--accent); margin-bottom: 40px;">Resource Library</h2>
    <div class="grid" id="gameGrid"></div>

    <div id="theater">
        <button class="close-btn" onclick="closeGame()">← Return</button>
        <iframe id="gameFrame" allow="autoplay; fullscreen; keyboard; gamepad"></iframe>
    </div>

    <script>
        // YOUR ACTUAL CREDENTIALS
        const ID = '27205';
        const TOKEN = 'KTR4FA7PAzGsPiVhXF0ptXU2IwXEvSgl';

        // Initialize SDK
        const gp = new GamePush.SDK({ id: ID, token: TOKEN });

        gp.on('ready', () => {
            console.log("GP Connection Successful");
            document.getElementById('loading').style.display = 'none';
            render();
        });

        gp.on('error', (err) => {
            console.error("GP Connection Failed:", err);
            document.getElementById('loading').innerHTML = "Connection Error: Check Allowed Domains in GamePush Panel.";
        });

        // Add your GamePush Slugs here
        const myApps = [
            { name: "Subway Surfers", slug: "subway-surfers", img: "https://www.gstatic.com/gamesnacks/images/subway_surfers/thumbnail_512.png" },
            { name: "Slope", slug: "slope", img: "https://topvazgames.github.io/images/slope.png" },
            { name: "Monkey Mart", slug: "monkey-mart", img: "https://www.gstatic.com/gamesnacks/images/om_nom_run/thumbnail_512.png" }
        ];

        function render() {
            const grid = document.getElementById('gameGrid');
            myApps.forEach(app => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${app.img}"><p>${app.name}</p>`;
                card.onclick = () => launch(app.slug);
                grid.appendChild(card);
            });
        }

        function launch(slug) {
            // Using the GamePush embed format
            const embedUrl = `https://gamepush.com/embed/${ID}/${slug}`;
            document.getElementById('gameFrame').src = embedUrl;
            document.getElementById('theater').style.display = 'block';
            document.title = "Google Docs"; // Tab Stealth
        }

        function closeGame() {
            document.getElementById('theater').style.display = 'none';
            document.getElementById('gameFrame').src = 'about:blank';
            document.title = "Workspace Dashboard";
        }
    </script>
</body>
</html>
