<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Storage Drive</title>
    <script src="https://unpkg.com/@gamepush/sdk/dist/gamepush.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161b2c; --accent: #7c4dff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #252a3d; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card p { padding: 10px; margin: 0; font-size: 14px; text-align: center; }
        #overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 10px; left: 10px; z-index: 1001; padding: 10px; background: #ff5252; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h2 id="welcome">Guest Portal</h2>
    <div class="grid" id="gameGrid"></div>

    <div id="overlay">
        <button class="close-btn" onclick="closeGame()">Exit Game</button>
        <iframe id="gameFrame"></iframe>
    </div>

    <script>
        // 1. Initialize GamePush (Replace with your actual ID/Token from gamepush.com)
        const gp = new GamePush.SDK({
            id: 'YOUR_PROJECT_ID',
            token: 'YOUR_PUBLIC_TOKEN'
        });

        gp.on('ready', () => {
            console.log("GamePush is ready!");
            if (gp.player.isLoggedIn) {
                document.getElementById('welcome').innerText = `Welcome, ${gp.player.name}`;
            }
        });

        // 2. Your Game List
        const games = [
            { n: "Slope", s: "https://slopegame.online/game/slope" },
            { n: "BitLife", s: "https://bitlifeonline.io/game/bitlife" },
            { n: "Retro Bowl", s: "https://retrobowl.me/game/retro-bowl" }
        ];

        const grid = document.getElementById('gameGrid');
        games.forEach(game => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<img src="https://via.placeholder.com/150/161b2c/ffffff?text=${game.n}"><p>${game.n}</p>`;
            div.onclick = () => {
                document.getElementById('gameFrame').src = game.s;
                document.getElementById('overlay').style.display = 'block';
                // Trigger a GamePush event (e.g., track that a game was opened)
                gp.analytics.goal('game_opened', { name: game.n });
            };
            grid.appendChild(div);
        });

        function closeGame() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }
    </script>
</body>
</html>
