<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salmon Games | Education Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #e67e22;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .logo { font-size: 24px; font-weight: bold; text-transform: uppercase; }
        
        /* The Poki-style Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background: #34495e;
            border-radius: 15px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border-bottom: 5px solid #212f3d;
            overflow: hidden;
        }
        .game-card:hover {
            transform: translateY(-5px);
            background: #fa8231;
        }
        .game-card img { width: 100%; height: 80%; object-fit: cover; }
        .game-card span { padding: 10px; font-weight: bold; font-size: 14px; }

        /* Fullscreen Game Overlay */
        #game-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }
        #close-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; background: #e74c3c; color: white;
            border: none; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Salmon Games</div>
    <nav>Trending • New • Logic</nav>
</header>

<div class="game-grid" id="grid">
    </div>

<div id="game-container">
    <button id="close-btn">BACK TO HUB</button>
</div>

<script src="main.js"></script>
</body>
</html>
