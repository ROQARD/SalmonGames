<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Workspace</title>
    <script src="https://unpkg.com/@gamepush/sdk/dist/gamepush.js"></script>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00e676; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0, 230, 118, 0.2); }
        .card img { width: 100%; height: 140px; object-fit: cover; background: #000; }
        .card p { padding: 12px; margin: 0; font-size: 14px; font-weight: 600; text-align: center; }

        #theater { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close { position: absolute; top: 15px; left: 15px; padding: 10px 20px; background: var(--accent); color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 1001; }
    </style>
</head>
<body>

    <h2 style="text-align:center; margin-bottom: 40px;">Application Dashboard</h2>
    <div class="grid" id="appGrid"></div>

    <div id="theater">
        <button class="close" onclick="exit()">Close</button>
        <iframe id="gameFrame" allow="autoplay; fullscreen; keyboard; gamepad"></iframe>
    </div>

    <script>
        // REPLACE THESE with your actual GamePush credentials
        const PROJECT_ID = '27205';
        const TOKEN = 'KTR4FA7PAzGsPiVhXF0ptXU2IwXEvSgl';

        const gp = new GamePush.SDK({ id: PROJECT_ID, token: TOKEN });

        gp.on('ready', async () => {
            console.log("Connected to GamePush");
            loadGames();
        });

        async function loadGames() {
            try {
                // We fetch the games linked to your GamePush project
                // In GamePush, "games" are often handled as 'Products' or via 'Game Catalog'
                // If you have games added to your project, we pull them here:
                const response = await fetch(`https://api.gamepush.com/games?project_id=${PROJECT_ID}`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await response.json();
                
                const container = document.getElementById('appGrid');
                
                // If you haven't added games to the API yet, we can fallback to your manual list 
                // but use GamePush to handle the login/iframe security.
                const myGames = [
                    { name: "Slope", slug: "slope", img: "https://img.gamepush.com/example/slope.png" },
                    { name: "Retro Bowl", slug: "retro-bowl", img: "https://img.gamepush.com/example/retro.png" }
                ];

                myGames.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${game.img}"><p>${game.name}</p>`;
                    card.onclick = () => launch(game.slug);
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("Failed to load GamePush games", e);
            }
        }

        function launch(slug) {
            // GamePush generates a secure embed URL for your games
            const url = `https://gamepush.com/embed/${PROJECT_ID}/${slug}`;
            document.getElementById('gameFrame').src = url;
            document.getElementById('theater').style.display = 'block';
            document.title = "Class Assignment"; // Stealth
        }

        function exit() {
            document.getElementById('theater').style.display = 'none';
            document.getElementById('gameFrame').src = 'about:blank';
            document.title = "My Workspace";
        }
    </script>
</body>
</html>
